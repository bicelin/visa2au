# Cloudflare Pages configuration for Visa2AU
# Backend: contact form with file uploads, D1 database, R2 storage, Resend email

name = "visa2au"
compatibility_date = "2026-04-24"

# D1 Database — stores form submissions and file metadata
# Created via: npx wrangler d1 create visa2au-db
[[d1_databases]]
binding = "visa2au_db"
database_name = "visa2au-db"
database_id = "4a3f3047-0097-4b8d-8cde-56d2a52e12ff"

# R2 Bucket — stores uploaded file attachments
# Created via: npx wrangler r2 bucket create visa2au-files
[[r2_buckets]]
binding = "visa2au_files"
bucket_name = "visa2au-files"

# Public environment variables (available in frontend + functions)
[vars]
SITE_URL = "https://visa2.au"

# Secrets — set via Wrangler CLI (encrypted, never committed):
#   npx wrangler pages secret put RESEND_API_KEY
#   npx wrangler pages secret put ADMIN_TOKEN
